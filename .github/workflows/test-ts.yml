name: Typescript Preflight

# Only triggers on changes to the TypeScript codebase
on:
  push:
    branches:
      - main
    paths:
      ['**/*.md', 'source/**', 'tests/**', 'package.json', 'package-lock.json']
  pull_request:
    branches:
      - main
    paths:
      ['**/*.md', 'source/**', 'tests/**', 'package.json', 'package-lock.json']

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22', '23']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run lint and test
        run: npm run test
