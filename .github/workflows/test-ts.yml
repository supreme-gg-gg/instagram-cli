name: Typescript Preflight

# Only triggers on changes to the TypeScript codebase
on:
  push:
    branches:
      - main
    paths: ['source/**', 'tests/**', 'package.json', 'package-lock.json']
  pull_request:
    branches:
      - main
    paths: ['source/**', 'tests/**', 'package.json', 'package-lock.json']

jobs:
  lint:
    name: Format and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier --check .

      - name: Run XO lint
        run: npx xo --ignore esbuild.config.mjs

  test:
    name: Unit and E2E Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx ava
